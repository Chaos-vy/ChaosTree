<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" width="980" height="520">
  <rect width="980" height="520" fill="#0d1117"/>

  <!-- Title -->
  <text x="490" y="36" font-family="monospace" font-size="15" font-weight="bold" fill="#e6edf3" text-anchor="middle">ChaosTree — Concurrent Insert Branch Misses (degree=32)</text>

  <!-- Y-axis label -->
  <text x="22" y="250" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle" transform="rotate(-90,22,250)">Branch Misses/op</text>

  <!-- Grid lines: scale 0..35, pixel_y = 440 - (val/35)*380
       0   -> 440
       7   -> 440 - 76  = 364
       14  -> 440 - 152 = 288
       21  -> 440 - 228 = 212
       28  -> 440 - 304 = 136
       35  -> 440 - 380 = 60
  -->
  <line x1="80" y1="440" x2="760" y2="440" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="364" x2="760" y2="364" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="288" x2="760" y2="288" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="212" x2="760" y2="212" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="136" x2="760" y2="136" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="60"  x2="760" y2="60"  stroke="#30363d" stroke-width="1" opacity="0.4"/>

  <!-- Y-axis tick labels -->
  <text x="72" y="444" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">0</text>
  <text x="72" y="368" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">7</text>
  <text x="72" y="292" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">14</text>
  <text x="72" y="216" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">21</text>
  <text x="72" y="140" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">28</text>
  <text x="72" y="64"  font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">35</text>

  <!-- Axes -->
  <line x1="80" y1="60" x2="80" y2="440" stroke="#484f58" stroke-width="1"/>
  <line x1="80" y1="440" x2="760" y2="440" stroke="#484f58" stroke-width="1"/>

  <!-- pixel_y = 440 - (val/35)*380 -->

  <!-- GROUP 0: center=180, size=1K
       BTree=10.091    -> py=440-(10.091/35)*380=440-109.6=330.4->330, h=110
       BPlusTree=15.031 -> py=440-(15.031/35)*380=440-163.2=276.8->277, h=163
  -->
  <rect x="153" y="330" width="25" height="110" fill="#EF5350" rx="2"/>
  <rect x="182" y="277" width="25" height="163" fill="#4C9BE8" rx="2"/>
  <text x="165" y="326" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">10.09</text>
  <text x="194" y="273" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">15.03</text>
  <text x="180" y="460" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">1K</text>

  <!-- GROUP 1: center=340, size=50K
       BTree=17.813    -> py=440-(17.813/35)*380=440-193.4=246.6->247, h=193
       BPlusTree=18.149 -> py=440-(18.149/35)*380=440-197.0=243.0->243, h=197
  -->
  <rect x="313" y="247" width="25" height="193" fill="#EF5350" rx="2"/>
  <rect x="342" y="243" width="25" height="197" fill="#4C9BE8" rx="2"/>
  <text x="325" y="243" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">17.81</text>
  <text x="354" y="239" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">18.15</text>
  <text x="340" y="460" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">50K</text>

  <!-- GROUP 2: center=500, size=1M
       BTree=19.965    -> py=440-(19.965/35)*380=440-216.8=223.2->223, h=217
       BPlusTree=23.341 -> py=440-(23.341/35)*380=440-253.5=186.5->187, h=253
  -->
  <rect x="473" y="223" width="25" height="217" fill="#EF5350" rx="2"/>
  <rect x="502" y="187" width="25" height="253" fill="#4C9BE8" rx="2"/>
  <text x="485" y="219" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">19.97</text>
  <text x="514" y="183" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">23.34</text>
  <text x="500" y="460" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">1M</text>

  <!-- GROUP 3: center=660, size=5M
       BTree=26.188    -> py=440-(26.188/35)*380=440-284.3=155.7->156, h=284
       BPlusTree=28.263 -> py=440-(28.263/35)*380=440-306.8=133.2->133, h=307
  -->
  <rect x="633" y="156" width="25" height="284" fill="#EF5350" rx="2"/>
  <rect x="662" y="133" width="25" height="307" fill="#4C9BE8" rx="2"/>
  <text x="645" y="152" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">26.19</text>
  <text x="674" y="129" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">28.26</text>
  <text x="660" y="460" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">5M</text>

  <!-- X-axis label -->
  <text x="420" y="490" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">Dataset Size</text>

  <!-- Legend at x=800 -->
  <rect x="800" y="90" width="14" height="14" fill="#EF5350" rx="2"/>
  <text x="820" y="101" font-family="monospace" font-size="12" fill="#e6edf3">BTree</text>
  <rect x="800" y="114" width="14" height="14" fill="#4C9BE8" rx="2"/>
  <text x="820" y="125" font-family="monospace" font-size="12" fill="#e6edf3">BPlusTree</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" width="980" height="520">
  <rect width="980" height="520" fill="#0d1117"/>

  <!-- Title -->
  <text x="490" y="36" font-family="monospace" font-size="15" font-weight="bold" fill="#e6edf3" text-anchor="middle">ChaosTree — Concurrent Mixed Branch Misses (degree=32)</text>

  <!-- Y-axis label -->
  <text x="22" y="250" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle" transform="rotate(-90,22,250)">Branch Misses/op</text>

  <!-- Grid lines: scale 0..30, pixel_y = 440 - (val/30)*380
       0   -> 440
       7.5 -> 440 - 95  = 345
       15  -> 440 - 190 = 250
       22.5-> 440 - 285 = 155
       30  -> 440 - 380 = 60
  -->
  <line x1="80" y1="440" x2="760" y2="440" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="345" x2="760" y2="345" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="250" x2="760" y2="250" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="155" x2="760" y2="155" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <line x1="80" y1="60"  x2="760" y2="60"  stroke="#30363d" stroke-width="1" opacity="0.4"/>

  <!-- Y-axis tick labels -->
  <text x="72" y="444" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">0</text>
  <text x="72" y="349" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">7.5</text>
  <text x="72" y="254" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">15</text>
  <text x="72" y="159" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">22.5</text>
  <text x="72" y="64"  font-family="monospace" font-size="11" fill="#8b949e" text-anchor="end">30</text>

  <!-- Axes -->
  <line x1="80" y1="60" x2="80" y2="440" stroke="#484f58" stroke-width="1"/>
  <line x1="80" y1="440" x2="760" y2="440" stroke="#484f58" stroke-width="1"/>

  <!-- pixel_y = 440 - (val/30)*380 -->

  <!-- GROUP 0: center=180, size=1K
       BTree=9.244    -> py=440-(9.244/30)*380=440-117.0=323.0->323, h=117
       BPlusTree=11.666-> py=440-(11.666/30)*380=440-147.7=292.3->292, h=148
  -->
  <rect x="153" y="323" width="25" height="117" fill="#EF5350" rx="2"/>
  <rect x="182" y="292" width="25" height="148" fill="#4C9BE8" rx="2"/>
  <text x="165" y="319" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">9.24</text>
  <text x="194" y="288" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">11.67</text>
  <text x="180" y="460" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">1K</text>

  <!-- GROUP 1: center=340, size=50K
       BTree=15.182    -> py=440-(15.182/30)*380=440-192.3=247.7->248, h=192
       BPlusTree=17.783 -> py=440-(17.783/30)*380=440-225.2=214.8->215, h=225
  -->
  <rect x="313" y="248" width="25" height="192" fill="#EF5350" rx="2"/>
  <rect x="342" y="215" width="25" height="225" fill="#4C9BE8" rx="2"/>
  <text x="325" y="244" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">15.18</text>
  <text x="354" y="211" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">17.78</text>
  <text x="340" y="460" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">50K</text>

  <!-- GROUP 2: center=500, size=1M
       BTree=16.382    -> py=440-(16.382/30)*380=440-207.5=232.5->233, h=207
       BPlusTree=22.635 -> py=440-(22.635/30)*380=440-286.6=153.4->153, h=287
  -->
  <rect x="473" y="233" width="25" height="207" fill="#EF5350" rx="2"/>
  <rect x="502" y="153" width="25" height="287" fill="#4C9BE8" rx="2"/>
  <text x="485" y="229" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">16.38</text>
  <text x="514" y="149" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">22.64</text>
  <text x="500" y="460" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">1M</text>

  <!-- GROUP 3: center=660, size=5M
       BTree=24.655    -> py=440-(24.655/30)*380=440-312.3=127.7->128, h=312
       BPlusTree=27.078 -> py=440-(27.078/30)*380=440-342.9=97.1->97, h=343
  -->
  <rect x="633" y="128" width="25" height="312" fill="#EF5350" rx="2"/>
  <rect x="662" y="97" width="25" height="343" fill="#4C9BE8" rx="2"/>
  <text x="645" y="124" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">24.66</text>
  <text x="674" y="93" font-family="monospace" font-size="8" fill="#e6edf3" text-anchor="middle">27.08</text>
  <text x="660" y="460" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">5M</text>

  <!-- X-axis label -->
  <text x="420" y="490" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">Dataset Size</text>

  <!-- Legend at x=800 -->
  <rect x="800" y="90" width="14" height="14" fill="#EF5350" rx="2"/>
  <text x="820" y="101" font-family="monospace" font-size="12" fill="#e6edf3">BTree</text>
  <rect x="800" y="114" width="14" height="14" fill="#4C9BE8" rx="2"/>
  <text x="820" y="125" font-family="monospace" font-size="12" fill="#e6edf3">BPlusTree</text>
</svg>
